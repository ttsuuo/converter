<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер валют</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="./styles/normalize.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <button class="theme-switch">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
        </button>
        <section class="currency-converter">

            <div class="currency__wrapper">
                <h1 class="currency__title">Конвертер валют</h1>

                <div class="currency__field currency__field--input">
                    <label for="amount" class="currency__label currency__label--amount">Количество:</label>
                    <div class="currency__input-wrapper">
                        <input type="number" class="currency__input" min="0" value="0">
                        <div class="currency__spin-buttons">
                            <button class="currency__spin-btn currency__spin-btn--up">▲</button>
                            <button class="currency__spin-btn currency__spin-btn--down">▼</button>
                        </div>
                    </div>
                </div>

                <div class="currency__list-wrapper">
                    <div class="currency__field">
                        <label for="from" class="currency__label currency__label--from">Из валюты:</label>
                        <select class="currency__select currency__select--from" name="currency">
                            <option class="currency__option" value="USD">USD (Доллар США)</option>
                            <option class="currency__option" value="EUR">EUR (Евро)</option>
                            <option class="currency__option" value="RUB">RUB (Российский рубль)</option>
                            <option class="currency__option" value="BYN">BYN (Белорусский рубль)</option>
                        </select>
                    </div>

                    <div class="currency__swap-icon-wrapper">
                        <svg class="currency__swap-icon" width="32" height="32" viewBox="0 0 13 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M9.14623 0.146227C9.23998 0.0525931 9.36706 0 9.49956 0C9.63206 0 9.75914 0.0525931 9.85289 0.146227L12.8529 3.14623C12.9465 3.23998 12.9991 3.36706 12.9991 3.49956C12.9991 3.63206 12.9465 3.75914 12.8529 3.85289L9.85289 6.85289C9.80712 6.90202 9.75192 6.94142 9.69059 6.96875C9.62925 6.99608 9.56304 7.01077 9.49591 7.01195C9.42877 7.01314 9.36209 7.00079 9.29983 6.97564C9.23757 6.95049 9.18101 6.91306 9.13354 6.86559C9.08606 6.81811 9.04863 6.76155 9.02348 6.69929C8.99833 6.63703 8.98598 6.57035 8.98717 6.50321C8.98835 6.43608 9.00305 6.36987 9.03037 6.30853C9.0577 6.2472 9.0971 6.192 9.14623 6.14623L11.2929 3.99956H3.49956C3.36695 3.99956 3.23977 3.94688 3.14601 3.85311C3.05224 3.75935 2.99956 3.63217 2.99956 3.49956C2.99956 3.36695 3.05224 3.23977 3.14601 3.14601C3.23977 3.05224 3.36695 2.99956 3.49956 2.99956H11.2929L9.14623 0.852893C9.05259 0.759143 9 0.63206 9 0.49956C9 0.36706 9.05259 0.239977 9.14623 0.146227ZM3.85289 6.14623C3.94653 6.23998 3.99912 6.36706 3.99912 6.49956C3.99912 6.63206 3.94653 6.75914 3.85289 6.85289L1.70623 8.99956H9.49956C9.63217 8.99956 9.75935 9.05224 9.85311 9.14601C9.94688 9.23978 9.99956 9.36695 9.99956 9.49956C9.99956 9.63217 9.94688 9.75935 9.85311 9.85311C9.75935 9.94688 9.63217 9.99956 9.49956 9.99956H1.70623L3.85289 12.1462C3.90202 12.192 3.94142 12.2472 3.96875 12.3085C3.99608 12.3699 4.01077 12.4361 4.01195 12.5032C4.01314 12.5703 4.00079 12.637 3.97564 12.6993C3.95049 12.7615 3.91306 12.8181 3.86559 12.8656C3.81811 12.9131 3.76155 12.9505 3.69929 12.9756C3.63703 13.0008 3.57035 13.0131 3.50321 13.012C3.43608 13.0108 3.36987 12.9961 3.30853 12.9687C3.2472 12.9414 3.192 12.902 3.14623 12.8529L0.146227 9.85289C0.0525931 9.75914 0 9.63206 0 9.49956C0 9.36706 0.0525931 9.23998 0.146227 9.14623L3.14623 6.14623C3.23998 6.05259 3.36706 6 3.49956 6C3.63206 6 3.75914 6.05259 3.85289 6.14623Z" fill="currentColor"/>
                        </svg>
                    </div>

                    <div class="currency__field">
                        <label for="to" class="currency__label currency__label--to">В валюту:</label>
                        <select class="currency__select currency__select--to" name="currency">
                            <option class="currency__option" value="USD">USD (Доллар США)</option>
                            <option class="currency__option" value="EUR">EUR (Евро)</option>
                            <option class="currency__option" value="RUB">RUB (Российский рубль)</option>
                            <option class="currency__option" value="BYN">BYN (Белорусский рубль)</option>
                        </select>
                    </div>
                </div>

                <input type="text" class="currency__output" readonly>
                
                <div class="currency__actions">
                    <button class="currency__button button">Convert</button>
                </div>

            </div>
        
        </section>

        <section class="history-rates">
            <div class="history-rates__wrapper">
                <canvas id="historyChart" class="history-rates__chart"></canvas>
            </div>
            <select class="currency__select currency__select--history" name="currency">
                <option class="currency__option currency__option--history" value="USD">USD</option>
                <option class="currency__option currency__option--history" value="RUB">RUB</option>
                <option class="currency__option currency__option--history" value="BYN">BYN</option>
            </select>
        </section>

    </div>
    <script src="./js/script.js" defer></script>
</body>
</html>
